<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Maker | Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h1>The Studio</h1>
            {% if error %}
            <div style="color: #721c24; background: #f8d7da; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.875rem;">
                {{ error }}
            </div>
            {% endif %}
            
            <form action="{{ url_for('login') }}" method="POST" id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn">Access Studio</button>
            </form>
            
            <div style="margin-top: 2rem; text-align: center; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                <p style="font-size: 0.875rem; color: #666; margin-bottom: 1rem;">Don't have an account?</p>
                <form action="{{ url_for('register') }}" method="POST">
                    <div class="form-group" style="display: flex; gap: 10px;">
                        <input type="text" name="username" placeholder="New Username" required style="flex: 1;">
                        <input type="password" name="password" placeholder="New Password" required style="flex: 1;">
                    </div>
                    <button type="submit" class="btn" style="background: white; color: var(--text-color); border: 1px solid var(--text-color);">Create Account</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
